function getT5Thresh(areaSqft,constType){
  if(constType==="comb")return 100; // combustible always 100% in Table 4
  const k=constType==="fr"?"fr":constType==="hnc"?"hnc":"lnc";
  for(const row of MFL_T5){if(areaSqft<row.maxSqft)return row[k];}

// APL
function calcAPL(){
  const v=gv(),pctV=pf(S.designPct),isAdq=S.sprinklerAdequate==="adequate",noSprk=S.sprinklerAdequate==="none",is80=pctV>=80,isLO=S.hazardClass==="light"||S.hazardClass==="ordinary";
  let sc=null,eq=false,R=[];const hasDef=countBold()>0;
  if(noSprk){eq=true;R.push("No sprinkler protection, so APL = PML");}
  else if(S.isStorage){R.push("Storage occupancy (Figure 1A)");if(isAdq&&!hasDef){R.push("Sprinkler system reliable and fully adequate");if(S.hasFL){sc="G";R.push("Significant FL/CL present, Scenario G");}else if(S.isSensitive){sc=S.protType==="esfr"?"I":S.protType==="cmsa"?"K":"D";R.push("Sensitive + "+S.protType.toUpperCase()+", Scenario "+sc);}else{sc=S.protType==="esfr"?"H":S.protType==="cmsa"?"J":"C";R.push("Non-sensitive + "+S.protType.toUpperCase()+", Scenario "+sc);}}else{R.push(isAdq?"Adequate but deficiencies identified":"Not fully adequate");if(S.hasFL){eq=true;R.push("FL/CL with deficient system, APL = PML");}else if(!is80&&!isAdq){eq=true;R.push("Less than 80% of design, APL = PML");}else if(!S.alarmsOk&&!isAdq){eq=true;R.push("Alarms/FD/PEO inadequate, APL = PML");}else if(hasDef){const t=getT1B();R.push(t.rsn);if(t.eq)eq=true;else if(t.sc)sc=t.sc;else sc="G";}else{sc="G";R.push("At least 80% design, Scenario G");}}}
  else{R.push("Non-storage (Figure "+(S.isSensitive?"1C":"1B")+")");if(isAdq&&!hasDef){R.push("Sprinkler system reliable and fully adequate");if(S.isSensitive){sc=isLO?"B":S.hasFL?"F":"D";}else{sc=isLO?"A":S.hasFL?"E":"C";}R.push("Scenario "+sc);}else{R.push(isAdq?"Adequate but deficiencies":"Not fully adequate");if(!is80&&!isAdq){eq=true;R.push("Less than 80% of design, APL = PML");}else if(S.hasFL){eq=true;R.push("FL/CL present, APL = PML");}else if(!S.alarmsOk&&!isAdq){eq=true;R.push("Alarms/FD/PEO inadequate, APL = PML");}else if(hasDef){const t=getT1B();R.push(t.rsn);if(t.eq)eq=true;else if(t.sc)sc=t.sc;else sc=S.isSensitive?"F":"E";}else{sc=S.isSensitive?"F":"E";R.push("Scenario "+sc);}}}
  let pB=0,pE=0,pI=0,bi="";
  if(sc&&APL_SC[sc]&&v.a>0){const s=APL_SC[sc],sys=S.sprinklerType==="dry"&&s.dry?s.dry:s.wet;bi=s.bi;

    ["fire","water","smoke"].forEach(t=>{const d=sys[t],ar=rA(d.a);pB+=(v.tb/v.a)*aplDmg(sc,t,'b',d.b)*ar;pE+=(v.te/v.a)*aplDmg(sc,t,'e',d.e)*ar;pI+=(v.ti/v.a)*aplDmg(sc,t,'i',d.i)*ar;});}
  return{sc,eq,R,pB:rLE(pB),pE:rLE(pE),pI:rLE(pI),pT:rLE(pB+pE+pI),bi};
}

// MFL - start with total site values, subtract adequately separated buildings, apply Table 4 percentages
function calcMFL(){
  // MFL starts from total site values — use raw state totals, not gv() which is primary-building-only
  const a=primaryArea(),siteTb=pf(S.totalBldg),siteTe=pf(S.totalEquip),siteTi=pf(S.totalInv);
  let by=pf(S.biYearly);if(S.biMode==="percent"&&pf(S.annualProd)>0&&pf(S.biPct)>0)by=pf(S.annualProd)*(pf(S.biPct)/100);
  const o=MFL_T[primaryOcc()];if(!o||a===0)return{biM:0,pB:0,pE:0,pI:0,pT:0,bV:0,mflA:0,hasFW:false,exclB:[],inclB:[],exclPD:0,sitePD:0,atRiskTotal:0,atRiskBldg:0,atRiskEquip:0,atRiskInv:0,bP:100,eP:100,iP:100};
  // Use comb percentages if hasCombConst flag is set (combustible cladding)
  const constKey=(S.hasCombConst&&primaryConst()!=='comb')?'comb':primaryConst();
  const d=o[constKey]||o.comb;
  let hasFW=S.fw4hr&&pf(S.fwArea)>0;
  let mflA=a;if(hasFW)mflA=Math.min(pf(S.fwArea),a);

  // Start with total site PD
  const sitePD=siteTb+siteTe+siteTi;

  // Fire wall only reduces the primary building proportionally
  let fwReduction=0;
  if(hasFW){fwReduction=bldgValue(S.primaryIdx)*(1-mflA/a);}

  // Check adjacent buildings for separation
  const exclB=[],inclB=[];
  S.buildings.forEach((b,i)=>{if(i===S.primaryIdx)return;
    const req=getSepReq(primaryConst(),b.construction||primaryConst(),S.hazardClass);
    const act=pf(b.separation);const bv=bldgValue(i);
    const info={idx:i,name:b.name||("Building "+(i+1)),area:pf(b.area),req,act,value:bv,construction:b.construction};
    if(act>=req&&act>0)exclB.push(info);else inclB.push(info);
  });

  // Subtract adequately separated building values
  let exclPD=0;exclB.forEach(b=>{exclPD+=b.value;});

  // Apply Table 4 (MFL_T) damage percentages to at-risk property
  const atRiskTotal=Math.max(sitePD-fwReduction-exclPD,0);
  const atRiskFrac=sitePD>0?atRiskTotal/sitePD:0;
  const atRiskBldg=rLE(siteTb*atRiskFrac);
  const atRiskEquip=rLE(siteTe*atRiskFrac);
  const atRiskInv=rLE(siteTi*atRiskFrac);

  // Apply Table 4 (MFL_T) damage percentages
  let pE=rLE(atRiskEquip*(d.e/100)),pI=rLE(atRiskInv*(d.i/100));

  const areaSqft=S.units==="metric"?a/0.0929:a; // convert to sqft for Table 5 lookup
  const t5Thresh=getT5Thresh(areaSqft,constKey);
  const condemned=d.b>=t5Thresh;
  let pB=condemned?rLE(atRiskBldg):rLE(atRiskBldg*(d.b/100));
  const effectiveBP=condemned?100:d.b;

  const pT=Math.max(pB+pE+pI,0);

  const biM=d.bi;
  return{biM,sitePD,fwReduction:rLE(fwReduction),exclPD:rLE(exclPD),pT,pB,pE,pI,bV:rLE(by/12*biM),mflA,hasFW,exclB,inclB,atRiskTotal:rLE(atRiskTotal),atRiskBldg,atRiskEquip,atRiskInv,bP:effectiveBP,eP:d.e,iP:d.i,t5Thresh,condemned,t4BldgPct:d.b};
}

// Hypothetical APL scenario: what would apply if sprinklers were adequate (used for deficient+no alarms PML)
function hypAPLSc(){const isLO=S.hazardClass==="light"||S.hazardClass==="ordinary";if(S.isStorage){if(S.hasFL)return"G";if(S.isSensitive)return S.protType==="esfr"?"I":S.protType==="cmsa"?"K":"D";return S.protType==="esfr"?"H":S.protType==="cmsa"?"J":"C";}if(S.isSensitive)return isLO?"B":"D";return isLO?"A":"C";}

// PML
function calcPML(){

    // For FL/CL, Table 1B, etc.: use fully-adequate scenario via hypAPLSc().
    const is80=(pf(S.designPct)||100)>=80,isAdq=S.sprinklerAdequate==="adequate";
    const hSc=(!is80&&!isAdq)?(S.isStorage?"G":(S.isSensitive?"F":"E")):hypAPLSc();
    const aplEqRsn=apl.R.filter(r=>r.toLowerCase().includes("apl = pml")).join("; ")||"Protection deficiencies";
    if(hSc&&APL_SC[hSc]){const s=APL_SC[hSc],sys=S.sprinklerType==="dry"&&s.dry?s.dry:s.wet;
      const rA=x=>{if(typeof x==="number")return Math.min(x,v.a);if(x==="design")return Math.min(designA,v.a);if(x==="2x")return Math.min(designA*2,v.a);if(x==="5x")return Math.min(designA*5,v.a);if(x==="comp")return Math.min(pf(S.compArea)||v.a,v.a);return 0};
      const aplFireA=rA(sys.fire.a);

      const sf=aplFireA>0?pmlFA/aplFireA:1;

      ["fire","water","smoke"].forEach(t=>{const zd=sys[t];const aplZA=rA(zd.a);const pmlZA=Math.min(Math.round(aplZA*sf),v.a);const bD=(v.tb/v.a)*pmlZA,eD=(v.te/v.a)*pmlZA,iD=(v.ti/v.a)*pmlZA;pB+=bD;pE+=eD;pI+=iD;zones.push({type:t,aplA:aplZA,pmlA:pmlZA,bPct:100,ePct:100,iPct:100,bD:rLE(bD),eD:rLE(eD),iD:rLE(iD)});});
      pB=Math.min(pB,v.tb);pE=Math.min(pE,v.te);pI=Math.min(pI,v.ti);

      return{biM:mfl.biM,bV:rLE(v.by/12*mfl.biM),pB:rLE(pB),pE:rLE(pE),pI:rLE(pI),pT,eq:true,rsn:`${aplEqRsn}: PML fire area modeled at 100% damage using hypothetical Scenario ${hSc} zone ratios scaled to design area × 1.5`,pmlFA,hypDesignA:designA,pmlAreaOverride:pf(S.pmlArea)>0,zones,hypSc:hSc,aplEqRsn,bP:100,eP:100,iP:100,mflCap};}
    return{...mfl,eq:true,rsn:`${aplEqRsn}: no adequate protection scenario available, so PML = MFL`,pT:Math.max(mfl.pT,apl.pT),aplFloor:apl.pT>mfl.pT,zones:[]};}
  const o=MFL_T[primaryOcc()];if(!o||v.a===0)return{pB:0,pE:0,pI:0,pT:0,biM:0,eq:false,zones:[]};
  const d=o[primaryConst()]||o.comb,designA=pf(S.designArea)||defDA();
  let pmlFA=pf(S.pmlArea);if(pmlFA<=0)pmlFA=designA*1.5;pmlFA=Math.min(pmlFA,v.a);
  let pB=0,pE=0,pI=0,zones=[];
  if(apl.sc&&APL_SC[apl.sc]){const s=APL_SC[apl.sc],sys=S.sprinklerType==="dry"&&s.dry?s.dry:s.wet;
    const aplFA=(x=>{if(typeof x==="number")return Math.min(x,v.a);if(x==="design")return Math.min(designA,v.a);if(x==="2x")return Math.min(designA*2,v.a);if(x==="5x")return Math.min(designA*5,v.a);if(x==="comp")return Math.min(pf(S.compArea)||v.a,v.a);return 0})(sys.fire.a);
    const sf=aplFA>0?pmlFA/aplFA:1;
    ["fire","water","smoke"].forEach(t=>{const zd=sys[t];const azA=(x=>{if(typeof x==="number")return Math.min(x,v.a);if(x==="design")return Math.min(designA,v.a);if(x==="2x")return Math.min(designA*2,v.a);if(x==="5x")return Math.min(designA*5,v.a);if(x==="comp")return Math.min(pf(S.compArea)||v.a,v.a);return 0})(zd.a);
      const pzA=Math.min(Math.round(azA*sf),v.a);const eb=aplDmg(apl.sc,t,'b',zd.b),ee=aplDmg(apl.sc,t,'e',zd.e),ei=aplDmg(apl.sc,t,'i',zd.i);const bD=(v.tb/v.a)*eb*pzA,eD=(v.te/v.a)*ee*pzA,iD=(v.ti/v.a)*ei*pzA;
      pB+=bD;pE+=eD;pI+=iD;zones.push({type:t,aplA:azA,pmlA:pzA,bPct:eb,ePct:ee,iPct:ei,bD:rLE(bD),eD:rLE(eD),iD:rLE(iD)});});}
  else{const r=v.a>0?pmlFA/v.a:1;pB=v.tb*(d.b/100)*r;pE=v.te*(d.e/100)*r;pI=v.ti*(d.i/100)*r;}
  let pT=rLE(pB+pE+pI),aplFloor=false;if(pT<apl.pT){aplFloor=true;pT=apl.pT;}
  return{biM:d.bi,pB:rLE(pB),pE:rLE(pE),pI:rLE(pI),pT,bV:rLE(v.by/12*d.bi),eq:false,rsn:"",aplFloor,pmlFA,zones,bP:d.b,eP:d.e,iP:d.i};
}

// Narrative
function genN(){
  const apl=calcAPL(),pml=calcPML(),mfl=calcMFL(),v=gv();
  const ct=CL[primaryConst()]||"",occ=primaryOcc(),sys=S.sprinklerType==="wet"?"wet pipe":"dry pipe";
  const sysName=SYS_LABELS[S.pmlSystem]||"fire protection system";
  const primaryFloors=pf(pb().floors);

  // BI helper: returns appropriate BI text based on mode
  function biText(months){
    if(S.biMode==="percent"&&pf(S.biPct)>0){
      return `${pf(S.biPct)}% of annual production for ${months} months`;
    } else if(v.by>0){
      return `${fmtF(v.by)}/year / 12 x ${months} months = ${fmtF(rLE(v.by/12*months))}`;
    }
    return `${months} months`;
  }

  // ===== APL =====
  let a=`The Anticipated Probable Loss (APL) estimate assumes all fire protection systems operate as installed and that emergency response personnel, both the site's Plant Emergency Organization (PEO) and public fire agencies, respond in accordance with existing plans.\n\n`;

  if(apl.eq){
    a+=`Due to ${S.sprinklerAdequate==="none"?"the absence of automatic sprinkler protection":"identified protection deficiencies"}, the APL is equal to the PML for this facility. Refer to the PML narrative for the loss scenario and supporting calculations.\n\n`;
    a+=`APL Property Damage (= PML):\n`;
    a+=`  Building:      ${fmtF(pml.pB)}\n`;
    a+=`  Equipment/M&E: ${fmtF(pml.pE)}\n`;
    a+=`  Inventory/WIP: ${fmtF(pml.pI)}\n`;
    a+=`  ─────────────────────────────\n`;
    a+=`  Total APL PD:  ${fmtF(pml.pT)}`;
    if(pml.biM){a+=`\nBusiness Interruption: ${biText(pml.biM)}`;}
  } else if(apl.sc&&APL_SC[apl.sc]&&v.a>0){
    const s=APL_SC[apl.sc],sysD=S.sprinklerType==="dry"&&s.dry?s.dry:s.wet;
    const rA=x=>{if(typeof x==="number")return Math.min(x,v.a);if(x==="design")return Math.min(pf(S.designArea)||defDA(),v.a);if(x==="2x")return Math.min((pf(S.designArea)||defDA())*2,v.a);if(x==="5x")return Math.min((pf(S.designArea)||defDA())*5,v.a);if(x==="comp")return Math.min(pf(S.compArea)||v.a,v.a);return 0};
    const rAL=x=>{if(typeof x==="number")return fN(x)+" "+aU();if(x==="design")return fN(pf(S.designArea)||defDA())+" "+aU()+" (design area)";if(x==="2x")return fN(rA(x))+" "+aU()+" (2x fire area)";if(x==="5x")return fN(rA(x))+" "+aU()+" (5x fire area)";if(x==="comp")return fN(rA(x))+" "+aU()+" (compartment)";return"0"};

    a+=`The worst case APL scenario involves a fire originating in the ${occ.toLowerCase()} area, a ${fN(v.a)} ${paU()} ${ct.toLowerCase()} building protected by a ${sys} automatic sprinkler system. Per FP 5020 Table 1A, Scenario ${apl.sc} (${s.d}), the fire would be controlled by the sprinkler system with damage distributed across three zones as follows:\n\n`;
    a+=`Site Values (primary building):\n`;
    a+=`  Building:      ${fmtF(v.tb)} total, ${cs()}${v.bpsf.toFixed(2)}/${aU()}\n`;
    a+=`  Equipment/M&E: ${fmtF(v.te)} total, ${cs()}${v.epsf.toFixed(2)}/${aU()}\n`;
    a+=`  Inventory/WIP: ${fmtF(v.ti)} total, ${cs()}${v.ipsf.toFixed(2)}/${aU()}\n\n`;

    ["fire","water","smoke"].forEach(t=>{
      const d=sysD[t],ar=rA(d.a);
      const eb=aplDmg(apl.sc,t,'b',d.b),ee=aplDmg(apl.sc,t,'e',d.e),ei=aplDmg(apl.sc,t,'i',d.i);
      const bD=(v.tb/v.a)*eb*ar, eD=(v.te/v.a)*ee*ar, iD=(v.ti/v.a)*ei*ar;
      const tU=t.charAt(0).toUpperCase()+t.slice(1);
      const adj=k=>{const ok=apl.sc+'_'+t+'_'+k;return S.aplDmgOverrides[ok]!==undefined?' (adjusted)':''};
      a+=`${tU} Damage Zone: ${rAL(d.a)}\n`;
      a+=`  Bldg:  ${cs()}${v.bpsf.toFixed(2)}/${aU()} x ${pct(eb)} x ${fN(ar)} ${aU()} = ${fmtF(rLE(bD))}${adj('b')}\n`;
      a+=`  Equip: ${cs()}${v.epsf.toFixed(2)}/${aU()} x ${pct(ee)} x ${fN(ar)} ${aU()} = ${fmtF(rLE(eD))}${adj('e')}\n`;
      a+=`  Inv:   ${cs()}${v.ipsf.toFixed(2)}/${aU()} x ${pct(ei)} x ${fN(ar)} ${aU()} = ${fmtF(rLE(iD))}${adj('i')}\n\n`;
    });

    a+=`  Building:      ${fmtF(apl.pB)}\n`;
    a+=`  Equipment/M&E: ${fmtF(apl.pE)}\n`;
    a+=`  Inventory/WIP: ${fmtF(apl.pI)}\n`;
    a+=`  ─────────────────────────────\n`;
    a+=`  Total APL PD:  ${fmtF(apl.pT)}\n\n`;
    // Parse APL BI range to get dollar estimate
    let aplBiDollar="";
    if(v.by>0&&apl.bi){
      const biStr=apl.bi.toLowerCase();
      let lowDays=0,highDays=0;
      if(biStr.includes("day")){const nums=biStr.match(/(\d+)/g);if(nums){lowDays=parseInt(nums[0]);highDays=nums[1]?parseInt(nums[1]):lowDays;}}
      else if(biStr.includes("week")){const nums=biStr.match(/(\d+)/g);if(nums){lowDays=parseInt(nums[0])*7;highDays=nums[1]?parseInt(nums[1])*7:lowDays;}}
      if(lowDays>0){
        const lowBI=rLE(v.by/365*lowDays),highBI=rLE(v.by/365*highDays);
        if(S.biMode==="percent"&&pf(S.biPct)>0){
          aplBiDollar=` (${pf(S.biPct)}% of annual production for ${lowDays} to ${highDays} days)`;
        } else {
          aplBiDollar=` (${fmtF(v.by)}/year / 365 x ${lowDays}-${highDays} days = ${fmtF(lowBI)} to ${fmtF(highBI)})`;
        }
      }
    }
    a+=`Business Interruption: ${apl.bi}${aplBiDollar} (per Table 1A, Scenario ${apl.sc})`;
  }
  if(primaryFloors>1){
    a+=`\n\nMulti-Story Building Note (FP 5020 Page 7):\nFor this ${primaryFloors}-story building, water damage should be considered on 2–3 floors directly below the sprinkler operating area, with each lower floor sustaining a lesser degree of damage. The same applies to smoke damage on 2–3 floors above the sprinkler operating area. The fire, water, and smoke zone areas in the APL calculation above represent the primary floor impact; supplemental adjacent-floor effects should be evaluated based on floor layout and separation.`;
  }
  S.aplN=a;

  // ===== PML =====
  let p=`The Probable Maximum Loss (PML) estimate assumes a single impairment to the fire protection system at the time of the incident, specifically the ${sysName} being out of service. Emergency response personnel are assumed to respond in accordance with existing plans, though notification may be delayed due to the impaired system.\n\n`;

  if(pml.eq){
    p+=`${pml.rsn}.\n\n`;
    if(pml.zones&&pml.zones.length>0){
      const aplFA=pml.zones[0].aplA;const sf=aplFA>0?(pml.pmlFA/aplFA):1;
      p+=`Site Values (primary building):\n`;
      p+=`  Building:      ${fmtF(v.tb)} total, ${cs()}${v.bpsf.toFixed(2)}/${aU()}\n`;
      p+=`  Equipment/M&E: ${fmtF(v.te)} total, ${cs()}${v.epsf.toFixed(2)}/${aU()}\n`;
      p+=`  Inventory/WIP: ${fmtF(v.ti)} total, ${cs()}${v.ipsf.toFixed(2)}/${aU()}\n\n`;
      const dA=pml.hypDesignA||pf(S.designArea)||defDA();
      if(pml.pmlAreaOverride){
        p+=`PML Fire Area (user-specified): ${fN(Math.round(pml.pmlFA))} ${aU()}\n\n`;
      } else {
        p+=`PML Fire Area Derivation:\n`;
        p+=`  Due to protection deficiencies (${pml.aplEqRsn||"APL = PML"}), the fire is assumed to grow uncontrolled across the entire sprinkler design area (full hydraulic zone) plus 50% spread into the adjacent zone before fire department arrival:\n`;
        p+=`    Full sprinkler zone (design area):    ${fN(dA)} ${aU()}\n`;
        p+=`    Adjacent zone spread (+50%):         +${fN(Math.round(dA*0.5))} ${aU()}\n`;
        p+=`    PML fire area (design area x 1.5):    ${fN(Math.round(pml.pmlFA))} ${aU()}\n\n`;
        p+=`  Note: the APL fire zone under Scenario ${pml.hypSc} is only ${fN(aplFA)} ${aU()} — the area where active sprinkler suppression would have controlled the fire. The PML fire area (${fN(Math.round(pml.pmlFA))} ${aU()}) is based on the full sprinkler zone boundary, not 1.5x the APL fire zone.\n\n`;
      }
      p+=`Scale Factor: PML fire area ${fN(Math.round(pml.pmlFA))} ${aU()} ÷ APL Scenario ${pml.hypSc} fire zone ${fN(aplFA)} ${aU()} = ${sf.toFixed(2)}x\n\n`;
      p+=`With protection deficiencies present, fire grows uncontrolled to the PML fire area; 100% damage is assumed throughout all affected zones (fire, water, and smoke zone proportions derived from hypothetical Scenario ${pml.hypSc}):\n\n`;
      pml.zones.forEach(z=>{const tU=z.type.charAt(0).toUpperCase()+z.type.slice(1);p+=`${tU} Zone: ${fN(z.aplA)} ${aU()} (Scenario ${pml.hypSc}) x ${sf.toFixed(2)} = ${fN(z.pmlA)} ${aU()}\n`;p+=`  Bldg:  ${cs()}${v.bpsf.toFixed(2)}/${aU()} x 100% x ${fN(z.pmlA)} ${aU()} = ${fmtF(z.bD)}\n`;p+=`  Equip: ${cs()}${v.epsf.toFixed(2)}/${aU()} x 100% x ${fN(z.pmlA)} ${aU()} = ${fmtF(z.eD)}\n`;p+=`  Inv:   ${cs()}${v.ipsf.toFixed(2)}/${aU()} x 100% x ${fN(z.pmlA)} ${aU()} = ${fmtF(z.iD)}\n\n`;});
      p+=`  Building:      ${fmtF(pml.pB)}\n`;
      p+=`  Equipment/M&E: ${fmtF(pml.pE)}\n`;
      p+=`  Inventory/WIP: ${fmtF(pml.pI)}\n`;
      p+=`  ─────────────────────────────\n`;
      p+=`  Total PML PD:  ${fmtF(pml.pT)}${pml.mflCap?" (limited to MFL)":""}`;
      if(pml.biM){p+=`\nBusiness Interruption: ${biText(pml.biM)}`;}
    } else {
      p+=`Under these conditions, damage is determined by FP 5020 Table 4 (${occ}, ${ct}):\n`;
      p+=`  Building:      ${fmtF(pml.pB)} (${pml.bP}%)\n`;
      p+=`  Equipment/M&E: ${fmtF(pml.pE)} (${pml.eP}%)\n`;
      p+=`  Inventory/WIP: ${fmtF(pml.pI)} (${pml.iP}%)\n`;
      p+=`  ─────────────────────────────\n`;
      p+=`  Total PML PD (= MFL): ${fmtF(pml.pT)}`;
      if(pml.biM){p+=`\nBusiness Interruption: ${biText(pml.biM)}`;}
    }
  } else {
    const da=pf(S.designArea)||defDA(), pa=pml.pmlFA||da*1.5;
    p+=`With the ${sysName} impaired, there is no containment of the fire until it reaches the boundary of the sprinkler system zone. The PML fire area is estimated at ${fN(Math.round(pa))} ${paU()}, based on the sprinkler design area of ${fN(da)} ${paU()} plus 50% for fire growth before external response limits the spread. The ${S.fdType==="fullypaid"?"fully-paid fire department":"fire department"} is assumed to respond and contain the fire in conjunction with physical separations.\n\n`;

    if(pml.zones&&pml.zones.length>0&&apl.sc){
      const aplFA=pml.zones[0].aplA;
      const sf=aplFA>0?(pa/aplFA):1;
      p+=`The damage zones are scaled proportionally from APL Scenario ${apl.sc}. The APL fire zone is ${fN(aplFA)} ${aU()} and the PML fire area is ${fN(Math.round(pa))} ${aU()}, giving a scale factor of ${sf.toFixed(2)}x:\n\n`;

      pml.zones.forEach(z=>{
        const tU=z.type.charAt(0).toUpperCase()+z.type.slice(1);
        p+=`${tU} Zone: ${fN(z.aplA)} ${aU()} (APL) x ${sf.toFixed(2)} = ${fN(z.pmlA)} ${aU()} (PML)\n`;
        p+=`  Bldg:  ${cs()}${v.bpsf.toFixed(2)}/${aU()} x ${pct(z.bPct)} x ${fN(z.pmlA)} ${aU()} = ${fmtF(z.bD)}\n`;
        p+=`  Equip: ${cs()}${v.epsf.toFixed(2)}/${aU()} x ${pct(z.ePct)} x ${fN(z.pmlA)} ${aU()} = ${fmtF(z.eD)}\n`;
        p+=`  Inv:   ${cs()}${v.ipsf.toFixed(2)}/${aU()} x ${pct(z.iPct)} x ${fN(z.pmlA)} ${aU()} = ${fmtF(z.iD)}\n\n`;
      });
    } else {
      p+=`Site Values (primary building):\n`;
      p+=`  Building:      ${fmtF(v.tb)} total, ${cs()}${v.bpsf.toFixed(2)}/${aU()}\n`;
      p+=`  Equipment/M&E: ${fmtF(v.te)} total, ${cs()}${v.epsf.toFixed(2)}/${aU()}\n`;
      p+=`  Inventory/WIP: ${fmtF(v.ti)} total, ${cs()}${v.ipsf.toFixed(2)}/${aU()}\n\n`;
      p+=`PML Damage (${fN(Math.round(pa))} ${aU()}, per Table 4 percentages):\n`;
      p+=`  Bldg:  ${cs()}${v.bpsf.toFixed(2)}/${aU()} x ${pml.bP}% x ${fN(Math.round(pa))} ${aU()} = ${fmtF(pml.pB)}\n`;
      p+=`  Equip: ${cs()}${v.epsf.toFixed(2)}/${aU()} x ${pml.eP}% x ${fN(Math.round(pa))} ${aU()} = ${fmtF(pml.pE)}\n`;
      p+=`  Inv:   ${cs()}${v.ipsf.toFixed(2)}/${aU()} x ${pml.iP}% x ${fN(Math.round(pa))} ${aU()} = ${fmtF(pml.pI)}\n\n`;
    }

    p+=`  Building:      ${fmtF(pml.pB)}\n`;
    p+=`  Equipment/M&E: ${fmtF(pml.pE)}\n`;
    p+=`  Inventory/WIP: ${fmtF(pml.pI)}\n`;
    p+=`  ─────────────────────────────\n`;
    p+=`  Total PML PD:  ${fmtF(pml.pT)}${pml.aplFloor?" (adjusted up to APL floor)":""}\n\n`;
    const aplBiMin=apl.bi?` Minimum APL BI duration is ${apl.bi} (Scenario ${apl.sc}).`:"";
    p+=`Business Interruption: ${biText(pml.biM)}\nNote: FP 5020 provides no specific BI duration guidance for PML. Duration is engineering discretion and should be no less than the APL BI duration.${aplBiMin}`;
  }

  if(primaryFloors>1){
    const perFloorContents=rLE((v.te+v.ti)/primaryFloors);
    const smokeAbove=rLE(perFloorContents*0.20);
    const waterBelow=rLE(perFloorContents*0.15);
    const pmlTotal=rLE(pml.pT+smokeAbove+waterBelow);
    p+=`\n\nMulti-Story Building — Adjacent Floor Damage (FP 5020 Page 7):\nThis ${primaryFloors}-story building requires consideration of smoke and water damage on floors adjacent to the fire floor.\n`;
    p+=`  Contents value per floor: (${fmtF(v.te)} equip + ${fmtF(v.ti)} inv) ÷ ${primaryFloors} floors = ${fmtF(perFloorContents)}/floor\n`;
    p+=`  Base PML (fire floor):    ${fmtF(pml.pT)}\n`;
    p+=`  Smoke above (1 floor):   +${fmtF(smokeAbove)} (20% × ${fmtF(perFloorContents)} contents/floor)\n`;
    p+=`  Water below (1 floor):   +${fmtF(waterBelow)} (15% × ${fmtF(perFloorContents)} contents/floor)\n`;
    p+=`  ─────────────────────────────\n`;
    p+=`  Total PML with floors:    ${fmtF(pmlTotal)}`;
  }
  S.pmlN=p;

  // ===== MFL =====
  let m=`The Maximum Foreseeable Loss (MFL) estimate assumes the complete failure of all active fire suppression systems and no effective response from the site PEO or public fire agencies. Actual damage percentages are determined by construction type and occupancy per FP 5020 Table 4.\n\n`;

  m+=`Total Site Property Damage: ${fmtF(mfl.sitePD)}\n`;
  m+=`  Building:      ${fmtF(v.tb)}\n`;
  m+=`  Equipment/M&E: ${fmtF(v.te)}\n`;
  m+=`  Inventory/WIP: ${fmtF(v.ti)}\n`;

  if(mfl.hasFW){
    const fwPct=(mfl.mflA/v.a*100).toFixed(1);
    m+=`\nA credited 4-hour rated MFL fire wall limits the primary building fire area to ${fN(mfl.mflA)} ${paU()} (${fwPct}% of ${fN(v.a)} ${paU()}). The portion of the primary building behind the fire wall is excluded:\n`;
    m+=`  Fire wall reduction: -${fmtF(mfl.fwReduction)}\n`;
  }

  if(mfl.exclB.length>0||mfl.inclB.length>0){
    m+=`\nBuilding Separation Analysis (Table 3a):\n`;
    m+=`The total site values include all buildings. Buildings with adequate separation per Table 3a are subtracted from the MFL since the fire is not expected to spread to those structures.\n\n`;
    mfl.exclB.forEach(b=>{m+=`  ${b.name}: ${fN(b.act)} ${dU()} actual vs ${b.req} ${dU()} required. Adequate separation, ${fmtF(b.value)} subtracted from MFL.\n`;});
    mfl.inclB.forEach(b=>{m+=`  ${b.name}: ${pf(b.act)>0?fN(b.act)+" "+dU()+" actual":"separation not specified"} vs ${b.req} ${dU()} required. Inadequate separation, ${fmtF(b.value)} remains in MFL.\n`;});
  }

  m+=`\n  Total Site PD:         ${fmtF(mfl.sitePD)}`;
  if(mfl.fwReduction>0) m+=`\n  Fire Wall Reduction:  -${fmtF(mfl.fwReduction)}`;
  if(mfl.exclPD>0) m+=`\n  Separated Buildings:  -${fmtF(mfl.exclPD)}`;
  if(mfl.fwReduction>0||mfl.exclPD>0){m+=`\n  ─────────────────────────────\n  At-Risk Property:      ${fmtF(mfl.atRiskTotal)}`;}

  m+=`\n\nTable 4 Damage Percentages (${occ}, ${ct}):\n`;
  m+=`  Building structure: ${mfl.t4BldgPct}%\n`;
  m+=`  Equipment/M&E:      ${mfl.eP}%\n`;
  m+=`  Inventory/WIP:      ${mfl.iP}%\n\n`;
  m+=`Table 5 — Building Condemnation Threshold (${fN(v.a)} ${paU()}, ${ct}):\n`;
  m+=`  Threshold: ${mfl.t5Thresh}%  |  Table 4 building damage: ${mfl.t4BldgPct}%\n`;
  if(mfl.condemned){
    m+=`  ${mfl.t4BldgPct}% ≥ ${mfl.t5Thresh}% → Building condemned → 100% building loss\n`;
    m+=`  Note: Repair of a structure at this damage level is often more costly than full demolition and reconstruction.\n`;
    m+=`  Equipment and inventory may still be partially salvageable.\n\n`;
  } else {
    m+=`  ${mfl.t4BldgPct}% < ${mfl.t5Thresh}% → Building repairable at ${mfl.t4BldgPct}% damage\n\n`;
  }
  m+=`MFL Property Damage:\n`;
  if(mfl.condemned){
    m+=`  Building:      ${fmtF(mfl.atRiskBldg)} × 100% = ${fmtF(mfl.pB)} (condemned per Table 5)\n`;
  } else {
    m+=`  Building:      ${fmtF(mfl.atRiskBldg)} × ${mfl.bP}% = ${fmtF(mfl.pB)}\n`;
  }
  m+=`  Equipment/M&E: ${fmtF(mfl.atRiskEquip)} × ${mfl.eP}% = ${fmtF(mfl.pE)}\n`;
  m+=`  Inventory/WIP: ${fmtF(mfl.atRiskInv)} × ${mfl.iP}% = ${fmtF(mfl.pI)}\n`;
  m+=`  ─────────────────────────────\n`;
  m+=`  Total MFL PD:  ${fmtF(mfl.pT)}`;

  m+=`\n\nBusiness Interruption: ${biText(mfl.biM)} (per Table 4, ${occ}, ${ct})`;
  S.mflN=m;
}

// UI

function inp(k,ph,tp){return`<input type="${tp||'text'}" value="${esc(S[k])}" placeholder="${ph||''}" oninput="su('${k}',this.value)" onblur="ib('${k}',this)">`}
function sel(k,os){return`<select onchange="set('${k}',this.value)">${os.map(o=>`<option value="${esc(o[0])}"${S[k]===o[0]?' selected':''}>${esc(o[1])}</option>`).join('')}</select>`}
function tog(l,k){return`<div class="tg" onclick="set('${k}',!S['${k}'])"><div class="tgt${S[k]?' on':''}"><div class="tgk"></div></div><span>${l}</span></div>`}
function vc(l,v,s,c){return`<div class="vc"><div class="vl">${l}</div><div class="vv ${c||''}">${v}</div>${s?`<div class="vs">${s}</div>`:''}</div>`}
function copyEl(id){const e=document.getElementById(id);if(e)navigator.clipboard.writeText(e.value||e.textContent)}
function copyAll(){const t=[S.aplN,S.pmlN,S.mflN].join('\n\n---\n\n');navigator.clipboard.writeText(t)}

// TABS
const TN=["Site Info","Values","BI","APL","PML","MFL","Summary","High Rise","Revision"];

function r0(){
  const oo=Object.keys(MFL_T).map(k=>[k,k]);

function aplSliderUI(sc){
  if(!sc||!APL_SC[sc])return'';
  const s=APL_SC[sc],sys=S.sprinklerType==="dry"&&s.dry?s.dry:s.wet;
  const zones=[["fire","Fire"],["water","Water"],["smoke","Smoke"]];
  const types=[["b","Bldg"],["e","Equip"],["i","Inv"]];
  let hasAny=false;
  zones.forEach(([z])=>types.forEach(([k])=>{if(sys[z][k]<1)hasAny=true}));
  if(!hasAny)return'';
  const hasOverrides=Object.keys(S.aplDmgOverrides).some(k=>k.startsWith(sc+'_'));
  let h='<div class="cd"><div class="ifx"><h3 class="ct" style="margin:0">Damage % Override (Table 1A)</h3>';
  if(hasOverrides)h+='<button class="apl-reset" onclick="resetAplDmg(\''+sc+'\')">Reset</button>';
  h+='</div>';
  h+='<div class="note">Table 1A Scenario '+sc+' damage percentages are shown below. To override, enter a decimal value (e.g. 0.30 for 30%). These values also carry through to PML zone-based calculations. Leave blank to use the Table 1A default.</div>';
  zones.forEach(([z,zl])=>{
    const zd=sys[z];
    const editable=types.some(([k])=>zd[k]<1);
    if(!editable)return;
    h+='<div class="apl-zone-hdr">'+zl+' Zone</div>';
    types.forEach(([k,kl])=>{
      const base=zd[k];
      if(base>=1){h+='<div class="apl-row"><label>'+kl+'</label><span style="color:var(--dim);font-size:11px">100% (fixed)</span></div>';return;}
      const oKey=sc+'_'+z+'_'+k;
      const isOv=S.aplDmgOverrides[oKey]!==undefined;
      const cur=isOv?S.aplDmgOverrides[oKey]:base;
      const rMin=Math.max(base*0.6,0.01),rMax=Math.min(base*1.4,1);
      h+='<div class="apl-row">';
      h+='<label>'+kl+'</label>';
      h+='<input type="number" step="0.005" min="0" max="1" value="'+(isOv?cur.toFixed(3):'')+'" placeholder="'+base.toFixed(3)+'" onchange="setAplDmg(\''+sc+'\',\''+z+'\',\''+k+'\',this.value||undefined)">';
      h+='<span class="pct-range">'+pct(cur)+(isOv?' *':'')+' &nbsp;typical '+(rMin*100).toFixed(0)+'–'+(rMax*100).toFixed(0)+'%</span>';
      h+='</div>';
    });
  });
  h+='</div>';
  return h;
}
